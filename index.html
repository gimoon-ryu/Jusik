<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jusik KRX Dashboard</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Jusik KRX Dashboard</h1>
      <p>상대강도, 거래대금 유지, ETF 노출, 성장 근거를 합산한 관심종목 랭킹</p>
    </div>
    <a class="button" href="data/krx_scores.csv">CSV</a>
  </header>
  <main>
    <section class="metrics">
      <article><span>최근 업데이트</span><strong id="updatedAt">-</strong></article>
      <article><span>표시 종목</span><strong id="stockCount">0</strong></article>
      <article><span>상위 점수</span><strong id="topScore">-</strong></article>
    </section>
    <section class="panel">
      <div class="panel-title">
        <h2>랭킹</h2>
        <p>점수는 매수 권유가 아니라 후보 압축용입니다.</p>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>종목</th>
              <th>점수</th>
              <th>등락률</th>
              <th>거래대금</th>
              <th>상대강도</th>
              <th>거래</th>
              <th>ETF</th>
              <th>성장</th>
              <th>메모</th>
            </tr>
          </thead>
          <tbody id="scoreRows">
            <tr><td colspan="10">데이터를 불러오는 중입니다.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
    <section class="panel">
      <div class="panel-title"><h2>업데이트 로그</h2></div>
      <div class="events" id="eventRows"><p>로그를 불러오는 중입니다.</p></div>
    </section>
  </main>
  <script src="assets/app.js"></script>
</body>
</html>
